<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PizzaDAO — Welcome</title>
    <meta
      name="description"
      content="Get started with PizzaDAO: join the community, mint a Rare Pizza, and play PizzaDAO games."
    />

    <meta property="og:title" content="PizzaDAO — Welcome!" />
    <meta
      property="og:description"
      content="Join the community, mint a Rare Pizza, and play PizzaDAO games."
    />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #000000;
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.68);
        --stroke: rgba(255, 255, 255, 0.12);
        --shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
        --radius: 18px;
        --pizza-yellow: #FFE135;
        --pizza-red: #E85D5D;
        --pizza-blue: #7DD3E8;
        --accent: #E85D5D;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: 'Rubik', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: var(--bg);

        /* ✅ NEW: smoother overall type + scale */
        font-size: 16px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
      a:focus-visible,
      button:focus-visible {
        outline: 3px solid rgba(255, 225, 53, 0.55);
        outline-offset: 2px;
        border-radius: 10px;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 36px 18px 60px;
      }

      header {
        display: grid;
        gap: 14px;
        padding: 26px 22px;
        border: 1px solid rgba(232, 93, 93, 0.3);
        background: linear-gradient(
          180deg,
          rgba(232, 93, 93, 0.35),
          rgba(232, 93, 93, 0.15)
        );
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
        text-align: center;
        justify-items: center;
      }

      header:before,
      header:after {
        content: "";
        position: absolute;
        inset: -50%;
        background: radial-gradient(
            300px 200px at 20% 30%,
            rgba(255, 255, 255, 0.1),
            transparent 60%
          ),
          radial-gradient(
            240px 170px at 80% 40%,
            rgba(255, 255, 255, 0.08),
            transparent 60%
          ),
          radial-gradient(
            220px 220px at 50% 80%,
            rgba(255, 255, 255, 0.05),
            transparent 65%
          );
        transform: rotate(6deg);
        pointer-events: none;
      }
      header:after {
        transform: rotate(-4deg);
        opacity: 0.65;
      }

      .logo {
        width: min(520px, 90%);
        height: auto;
        margin: 4px 0 2px;
        filter: drop-shadow(0 18px 60px rgba(0, 0, 0, 0.55));
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 3.6vw, 42px);
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 1.08;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.55;
        max-width: 72ch;
      }

      /* Social icon links */
      .socials {
        display: flex;
        gap: 14px;
        margin-top: 6px;
        justify-content: center;
      }
      .social-icon {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        transition: transform 120ms ease, background 120ms ease,
          border-color 120ms ease;
      }
      .social-icon svg {
        width: 20px;
        height: 20px;
        opacity: 0.9;
      }
      .social-icon:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.14);
        border-color: var(--accent);
      }

      main {
        margin-top: 18px;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }
      @media (min-width: 700px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (min-width: 980px) {
        .grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      .card {
        border-radius: var(--radius);
        border: 1px solid var(--stroke);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.07),
          rgba(255, 255, 255, 0.03)
        );
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        overflow: hidden;
        transition: transform 140ms ease, border-color 140ms ease,
          background 140ms ease, box-shadow 140ms ease;
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 14px;
        padding: 14px;
        align-items: center;
        min-height: 132px;
      }

      /* ✅ UPDATED: hover outline becomes red */
      .card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.09),
          rgba(255, 255, 255, 0.04)
        );
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
      }

      .thumb {
        width: 110px;
        height: 110px;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.25);
        flex: 0 0 auto;
      }
      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.05) contrast(1.05);
      }

      .cardBody {
        min-width: 0;
      }

      .titleRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .title {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.015em;
        line-height: 1.2;
      }

      .meta {
        margin-top: 7px;
        color: var(--muted);

        /* ✅ NEW: better type scale */
        font-size: 14px;
        line-height: 1.45;
      }

      footer {
        margin-top: 18px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 13px;
        text-align: center;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 0.95em;
      }

      /* --- ✅ NEW: GitHub corner link --- */
      /* --- ✅ NEW: Sheets corner link (left of GitHub) --- */
.sheets-link {
  position: fixed;
  bottom: 16px;
  right: 68px; /* 16 + 44 + 8 gap => sits left of github */
  z-index: 1000;

  width: 44px;
  height: 44px;
  border-radius: 12px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.14);
  backdrop-filter: blur(6px);

  transition: transform 120ms ease, border-color 120ms ease,
    background 120ms ease;
}

.sheets-link:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.1);
}

/* Use an IMG so we can pull from simpleicons */
.sheets-link img {
  width: 22px;
  height: 22px;
  opacity: 0.92;
  display: block;
}

      .github-link {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 1000;

        width: 44px;
        height: 44px;
        border-radius: 12px;

        display: flex;
        align-items: center;
        justify-content: center;

        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(6px);

        transition: transform 120ms ease, border-color 120ms ease,
          background 120ms ease;
      }

      .github-link:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.1);
      }

      .github-link svg {
        width: 22px;
        height: 22px;
        fill: white;
        opacity: 0.92;
      }

      /* --- Modal styles --- */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 2000;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(10px);
        justify-content: center;
        align-items: center;
        padding: 24px;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: linear-gradient(180deg, #1a1a24 0%, #111118 100%);
        border: 1px solid rgba(255, 225, 53, 0.2);
        border-radius: var(--radius);
        box-shadow:
          0 30px 100px rgba(0, 0, 0, 0.7),
          0 0 60px rgba(255, 225, 53, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        max-width: 780px;
        width: 100%;
        padding: 32px 28px 28px;
        position: relative;
      }
      .modal-close {
        position: absolute;
        top: 10px;
        right: 12px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        color: var(--muted);
        font-size: 18px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition: background 120ms ease, color 120ms ease;
      }
      .modal-close:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.12);
      }
      .modal-title {
        margin: 0 0 22px;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-align: center;
        color: var(--pizza-yellow);
      }
      .modal-title::after {
        content: "";
        display: block;
        width: 40px;
        height: 3px;
        background: var(--pizza-red);
        border-radius: 2px;
        margin: 10px auto 0;
      }

      /* Modal cards: vertical layout */
      .modal .card {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        text-align: center;
        padding: 0;
        min-height: auto;
        border-color: rgba(255, 255, 255, 0.08);
        background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
      }
      .modal .card:hover {
        border-color: var(--pizza-red);
        background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
      }
      .modal .thumb {
        width: 100%;
        height: 140px;
        border-radius: 16px 16px 0 0;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .modal .cardBody {
        padding: 14px 16px 16px;
      }
      .modal .titleRow {
        justify-content: center;
      }
      .modal .title {
        font-size: 16px;
        font-weight: 800;
      }
      .modal .meta {
        font-size: 13px;
        margin-top: 6px;
      }
      .modal .grid {
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }
      @media (min-width: 600px) {
        .modal .grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      /* Arcade modal: wider for iframe */
      .modal-arcade {
        max-width: 960px;
      }

      /* Go Deeper modal: center 2 cards */
      #modal-deeper-grid {
        max-width: 520px;
        margin: 0 auto;
      }
      @media (min-width: 600px) {
        #modal-deeper-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          max-width: 740px;
        }
      }

      .section-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        gap: 0;
        padding: 0;
        border-radius: 14px;
        border: 1px solid rgba(255, 225, 53, 0.4);
        overflow: hidden;
        position: relative;
        min-height: 140px;
        color: var(--pizza-yellow);
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease,
          box-shadow 120ms ease;
        text-decoration: none;
        background: #000;
      }
      .section-btn .btn-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.4;
        transition: opacity 200ms ease;
      }
      .section-btn .btn-label {
        position: relative;
        z-index: 1;
        padding: 14px 16px;
        width: 100%;
        text-align: center;
        background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
      }
      .section-btn:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 225, 53, 0.65);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      }
      .section-btn:hover .btn-img {
        opacity: 0.55;
      }

      /* Button grid */
      .btn-row {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, 1fr);
      }
      @media (min-width: 700px) {
        .btn-row {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      .btn-row .section-btn {
        justify-content: center;
        text-align: center;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <header>
        <img class="logo" src="images/logo.png" alt="PizzaDAO" />

        <h1>Welcome!</h1>
        <p class="sub">
          Join the community, mint a Rare Pizza, and play PizzaDAO games.
        </p>

        <div class="socials">

          </a>
        </div>
      </header>

      <main>
        <div class="btn-row">
          <button class="section-btn" onclick="document.getElementById('modal-start').classList.add('open')">
            <img class="btn-img" src="images/join-pizzadao.png" alt="" loading="lazy" />
            <span class="btn-label">🍕 Get Started</span>
          </button>
          <a class="section-btn" href="https://rarepizzas.com/mint" target="_blank" rel="noreferrer">
            <img class="btn-img" src="images/rare-pizzas.png" alt="" loading="lazy" />
            <span class="btn-label">🍕 Mint a Rare Pizza</span>
          </a>
          <button class="section-btn" onclick="document.getElementById('arcade-iframe').src='https://c-r-x-s-s.github.io/PizzaDAO-Arcade/';document.getElementById('modal-arcade').classList.add('open')">
            <img class="btn-img" src="images/bitcoin-blastoff.png" alt="" loading="lazy" />
            <span class="btn-label">🕹️ PizzaDAO Arcade</span>
          </button>
          <button class="section-btn" onclick="document.getElementById('modal-involve').classList.add('open')">
            <img class="btn-img" src="images/community-call.png" alt="" loading="lazy" />
            <span class="btn-label">🤝 Get Involved</span>
          </button>
          <button class="section-btn" onclick="document.getElementById('modal-deeper').classList.add('open')">
            <img class="btn-img" src="images/ens.png" alt="" loading="lazy" />
            <span class="btn-label">🔥 Go Deeper</span>
          </button>
          <button class="section-btn" onclick="document.getElementById('modal-metaverse').classList.add('open')">
            <img class="btn-img" src="images/voxels-pizzeria.jpeg" alt="" loading="lazy" />
            <span class="btn-label">🌐 Visit the Metaverse</span>
          </button>
        </div>

        <footer>Built with 🍕 and ❤️</footer>
      </main>
    </div>
    
    <!-- Modal: PizzaDAO Arcade -->

      <div class="modal modal-arcade">
        <button class="modal-close" onclick="var m=document.getElementById('modal-arcade');m.classList.remove('open');m.querySelector('iframe').src='about:blank'">&times;</button>

        <iframe id="arcade-iframe" src="about:blank" allow="autoplay" style="width:100%;height:70vh;border:none;border-radius:12px;background:#000"></iframe>
