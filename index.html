<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PizzaDAO — Welcome</title>
    <meta
      name="description"
      content="Get started with PizzaDAO: join the community, mint a Rare Pizza, and play PizzaDAO games."
    />

    <meta property="og:title" content="PizzaDAO — Welcome!" />
    <meta
      property="og:description"
      content="Join the community, mint a Rare Pizza, and play PizzaDAO games."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="images/logo.png" />

    <link rel="icon" type="image/png" href="images/logo.png" />
    <meta name="theme-color" content="#0a0a14" />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="wrap">
      <header>
        <img class="logo" src="images/logo.png" alt="PizzaDAO" />

        <h1>Welcome!</h1>
        <p class="sub">
          Join the community, mint a Rare Pizza, and play PizzaDAO games.
        </p>

        <div class="socials">
          <a href="https://discord.pizzadao.xyz" target="_blank" rel="noreferrer" aria-label="Join Discord" class="social-icon">
            <svg viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
          </a>
          <a href="https://x.com/pizza_dao" target="_blank" rel="noreferrer" aria-label="Follow on X" class="social-icon">
            <svg viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          </a>
        </div>
      </header>

      <main>
        <div class="btn-row">
          <button class="section-btn accent-yellow" data-modal="modal-start">
            <img class="btn-img" src="images/join-pizzadao.png" alt="" loading="lazy" />
            <span class="btn-label">🍕 Get Started</span>
          </button>
          <a class="section-btn accent-red" href="https://rarepizzas.com/mint" target="_blank" rel="noreferrer">
            <img class="btn-img" src="images/rare-pizzas.png" alt="" loading="lazy" />
            <span class="btn-label">🍕 Mint a Rare Pizza</span>
          </a>
          <button class="section-btn accent-blue" data-modal="modal-arcade">
            <img class="btn-img" src="images/bitcoin-blastoff.png" alt="" loading="lazy" />
            <span class="btn-label">🕹️ PizzaDAO Arcade</span>
          </button>
          <button class="section-btn accent-yellow" data-modal="modal-involve">
            <img class="btn-img" src="images/community-call.png" alt="" loading="lazy" />
            <span class="btn-label">🤝 Get Involved</span>
          </button>
          <button class="section-btn accent-red" data-modal="modal-deeper">
            <img class="btn-img" src="images/ens.png" alt="" loading="lazy" />
            <span class="btn-label">🔥 Go Deeper</span>
          </button>
          <button class="section-btn accent-blue" data-modal="modal-metaverse">
            <img class="btn-img" src="images/voxels-pizzeria.jpeg" alt="" loading="lazy" />
            <span class="btn-label">🌐 Visit the Metaverse</span>
          </button>
        </div>

        <footer>Built with 🍕 and ❤️</footer>
      </main>
    </div>

    <!-- Modal: PizzaDAO Arcade -->
    <div class="modal-overlay" id="modal-arcade">
      <div class="modal modal-arcade" role="dialog" aria-modal="true" aria-labelledby="modal-arcade-title">
        <button class="modal-close" aria-label="Close modal">&times;</button>
        <h3 class="modal-title" id="modal-arcade-title">PizzaDAO Arcade</h3>
        <iframe id="arcade-iframe" src="about:blank" allow="autoplay" style="width:100%;height:70vh;border:none;border-radius:12px;background:#000"></iframe>
      </div>
    </div>

    <!-- Modal: Get Started -->
    <div class="modal-overlay" id="modal-start">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-start-title">
        <button class="modal-close" aria-label="Close modal">&times;</button>
        <h3 class="modal-title" id="modal-start-title">Get Started</h3>
        <div class="grid" id="modal-start-grid"></div>
      </div>
    </div>

    <!-- Modal: Get Involved -->
    <div class="modal-overlay" id="modal-involve">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-involve-title">
        <button class="modal-close" aria-label="Close modal">&times;</button>
        <h3 class="modal-title" id="modal-involve-title">Get Involved</h3>
        <div class="grid" id="modal-involve-grid"></div>
      </div>
    </div>

    <!-- Modal: Go Deeper -->
    <div class="modal-overlay" id="modal-deeper">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-deeper-title">
        <button class="modal-close" aria-label="Close modal">&times;</button>
        <h3 class="modal-title" id="modal-deeper-title">Go Deeper</h3>
        <div class="grid" id="modal-deeper-grid"></div>
      </div>
    </div>

    <!-- Modal: Metaverse -->
    <div class="modal-overlay" id="modal-metaverse">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-metaverse-title">
        <button class="modal-close" aria-label="Close modal">&times;</button>
        <h3 class="modal-title" id="modal-metaverse-title">Enter the Metaverse</h3>
        <div class="grid" id="modal-metaverse-grid"></div>
      </div>
    </div>

    <!-- Bottom-right Google Sheets link -->
    <a
      class="sheets-link"
      href="https://docs.google.com/spreadsheets/d/1_r-OKdLUcJWGN17a2H8FPi5zUq9yoNadJpGyVoFY5ro/edit?gid=0#gid=0"
      target="_blank"
      rel="noreferrer"
      aria-label="Open Google Sheets"
    >
      <img
        src="https://cdn.simpleicons.org/googlesheets/ffffff"
        alt="Google Sheets"
      />
    </a>

    <!-- Bottom-right GitHub link -->
    <a
      class="github-link"
      href="https://github.com/PizzaDAO/pizzadao-landing-page"
      target="_blank"
      rel="noreferrer"
      aria-label="PizzaDAO Landing Page on GitHub"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M12 .5C5.73.5.5 5.74.5 12.2c0 5.17 3.44 9.56 8.21 11.1.6.11.82-.27.82-.59v-2.2c-3.34.75-4.04-1.65-4.04-1.65-.55-1.44-1.34-1.82-1.34-1.82-1.1-.78.08-.77.08-.77 1.22.09 1.86 1.28 1.86 1.28 1.08 1.92 2.83 1.37 3.52 1.05.11-.8.42-1.37.76-1.69-2.66-.31-5.46-1.37-5.46-6.09 0-1.35.46-2.45 1.23-3.32-.12-.31-.53-1.56.12-3.25 0 0 1-.33 3.3 1.27a11.1 11.1 0 0 1 6 0c2.3-1.6 3.3-1.27 3.3-1.27.65 1.69.24 2.94.12 3.25.77.87 1.23 1.97 1.23 3.32 0 4.73-2.8 5.78-5.47 6.08.43.38.81 1.12.81 2.26v3.35c0 .32.22.7.82.59 4.77-1.54 8.21-5.93 8.21-11.1C23.5 5.74 18.27.5 12 .5z"
        />
      </svg>
    </a>

    <script src="app.js"></script>
  </body>
</html>
